version: '3.8'

services:
  cfui:
    image: ghcr.io/dockers-x/cfui:latest
    # Or use Docker Hub:
    # image: czyt/cfui:latest
    container_name: cfui
    restart: unless-stopped
    ports:
      - "14333:14333"
    volumes:
      # Persist configuration and data
      - cloudflared-data:/app/data
      # Persist logs (can be mounted separately for log management)
      - cloudflared-logs:/app/logs
    environment:
      # Optional: Override default port (default is 14333)
      - PORT=14333
      # Optional: Set timezone
      - TZ=UTC
      # Optional: Set log level (debug, info, warn, error)
      # - LOG_LEVEL=info
      # Optional: Enable remote Cloudflare Tunnel public hostname management.
      # This is independent from the local cloudflared token runner and remains
      # disabled unless explicitly enabled.
      # - CFUI_TUNNEL_MGMT_ENABLED=true
      # - CLOUDFLARE_ACCOUNT_ID=your-account-id
      # - CLOUDFLARE_TUNNEL_ID=your-tunnel-id
      # Recommended auth mode:
      # - CLOUDFLARE_API_TOKEN=your-api-token
      # Alternative global-key auth:
      # - CLOUDFLARE_API_EMAIL=you@example.com
      # - CLOUDFLARE_API_KEY=your-global-api-key
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:$$PORT/ || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    # Optional: Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  cloudflared-data:
    driver: local
  cloudflared-logs:
    driver: local
